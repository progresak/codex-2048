<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#0d1020">
  <title>2048 — Neon Edition</title>
  <style>
    :root{--gap:clamp(8px,2vw,14px);--size:min(88vw,520px);--cell:calc((var(--size) - 5 * var(--gap))/4);--ease:cubic-bezier(.2,.9,.25,1.2)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;overscroll-behavior:none}
    body{min-height:100svh;display:grid;place-items:center;padding:24px 12px;color:#f8f7ff;background:radial-gradient(circle at 20% 0,#342164 0,transparent 36%),radial-gradient(circle at 90% 90%,#123b58 0,transparent 38%),#090b16;font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,sans-serif;overflow-x:hidden;transition:filter .5s}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(#ffffff06 1px,transparent 1px),linear-gradient(90deg,#ffffff06 1px,transparent 1px);background-size:32px 32px;mask-image:linear-gradient(to bottom,#000,transparent)}
    .app{width:var(--size);position:relative;z-index:1}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:16px}
    h1{font-size:clamp(54px,14vw,82px);line-height:.8;letter-spacing:-.08em;margin:0;background:linear-gradient(135deg,#fff,#a78bfa 45%,#22d3ee);-webkit-background-clip:text;color:transparent;filter:drop-shadow(0 8px 20px #8b5cf655)}
    .tag{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:#a9a6be;margin-top:10px}.scores{display:flex;gap:8px}.scorebox{min-width:82px;padding:9px 12px;text-align:center;border:1px solid #ffffff20;border-radius:15px;background:#ffffff0d;box-shadow:inset 0 1px #ffffff18,0 12px 30px #0004;backdrop-filter:blur(18px)}
    .scorebox span{display:block;color:#aaa6bd;font-weight:800;font-size:10px;letter-spacing:.12em}.scorebox b{font-size:21px;font-variant-numeric:tabular-nums}.scorebox.bump{animation:scoreBump .32s var(--ease)}
    .bar{min-height:42px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.status{font-size:13px;color:#b8b5c8}.combo{display:inline-flex;margin-left:6px;padding:4px 8px;border-radius:999px;color:#130c1e;background:linear-gradient(135deg,#fde047,#fb7185);font-weight:900;opacity:0;transform:scale(.8);transition:.2s}.combo.on{opacity:1;transform:scale(1)}
    button{border:1px solid #ffffff20;color:#fff;background:#ffffff10;border-radius:12px;padding:9px 13px;font:700 12px inherit;cursor:pointer;backdrop-filter:blur(12px);transition:.2s}button:hover:not(:disabled){background:#ffffff20;transform:translateY(-2px)}button:active:not(:disabled){transform:scale(.96)}button:disabled{opacity:.3;cursor:not-allowed}.actions{display:flex;gap:7px}
    .board{position:relative;width:var(--size);height:var(--size);padding:var(--gap);border:1px solid #ffffff1c;border-radius:clamp(20px,5vw,32px);background:#ffffff0d;box-shadow:inset 0 1px #ffffff18,0 30px 90px #0008;backdrop-filter:blur(28px);touch-action:none;user-select:none}
    .grid{display:grid;grid-template:repeat(4,1fr)/repeat(4,1fr);gap:var(--gap);height:100%}.cell{border-radius:clamp(11px,3vw,20px);background:#ffffff09;box-shadow:inset 0 2px 8px #0003}
    .tiles,.fly{position:absolute;inset:var(--gap);pointer-events:none}.tile{position:absolute;width:var(--cell);height:var(--cell);left:calc(var(--c)*(var(--cell) + var(--gap)));top:calc(var(--r)*(var(--cell) + var(--gap)));display:grid;place-items:center;border-radius:clamp(11px,3vw,20px);font-size:clamp(25px,8vw,48px);font-weight:950;letter-spacing:-.06em;color:#fff;background:var(--bg);box-shadow:inset 0 2px #ffffff42,0 10px 22px var(--shadow,#0005);text-shadow:0 2px 8px #0005;will-change:transform;z-index:2}.tile.small{font-size:clamp(20px,6vw,38px)}.tile.tiny{font-size:clamp(17px,5vw,31px)}
    .tile.spawn{animation:spawn .24s var(--ease)}.tile.merge{animation:merge .34s var(--ease)}
    .v2{--bg:linear-gradient(135deg,#475569,#64748b);--shadow:#64748b55}.v4{--bg:linear-gradient(135deg,#2563eb,#38bdf8);--shadow:#38bdf877}.v8{--bg:linear-gradient(135deg,#7c3aed,#a78bfa);--shadow:#a78bfa77}.v16{--bg:linear-gradient(135deg,#db2777,#fb7185);--shadow:#fb718577}.v32{--bg:linear-gradient(135deg,#ea580c,#fb923c);--shadow:#fb923c77}.v64{--bg:linear-gradient(135deg,#dc2626,#f43f5e);--shadow:#f43f5e88}.v128{--bg:linear-gradient(135deg,#ca8a04,#facc15);--shadow:#facc1588}.v256{--bg:linear-gradient(135deg,#059669,#34d399);--shadow:#34d39988}.v512{--bg:linear-gradient(135deg,#0891b2,#22d3ee);--shadow:#22d3ee99}.v1024{--bg:linear-gradient(135deg,#6d28d9,#ec4899);--shadow:#ec489999}.v2048,.v4096{--bg:linear-gradient(135deg,#fbbf24,#fff,#f472b6);--shadow:#fde047cc;color:#2b1735;animation:glow 1.1s infinite alternate}.v4096{--bg:linear-gradient(135deg,#fff,#22d3ee,#a78bfa,#fb7185)}
    .near{margin-top:12px;text-align:center;height:20px;font-size:13px;color:#fbbf24;opacity:0;transition:.3s}.near.show{opacity:1;animation:pulse 1.3s infinite}
    .modal{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:22px;background:#070913d9;backdrop-filter:blur(18px);opacity:0;pointer-events:none;transition:.35s}.modal.show{opacity:1;pointer-events:auto}.card{text-align:center;max-width:440px;padding:35px;border:1px solid #ffffff24;border-radius:28px;background:linear-gradient(145deg,#ffffff16,#ffffff08);box-shadow:0 30px 100px #0009;transform:scale(.8) translateY(30px);transition:.45s var(--ease)}.show .card{transform:none}.card h2{margin:0 0 8px;font-size:clamp(40px,12vw,72px);line-height:.9;background:linear-gradient(135deg,#fde047,#fb7185,#a78bfa);-webkit-background-clip:text;color:transparent}.card p{color:#cbc7db}.card button{font-size:15px;padding:13px 22px;background:linear-gradient(135deg,#7c3aed,#db2777)}
    .toast{position:fixed;z-index:30;left:50%;top:22px;transform:translate(-50%,-130px);padding:13px 20px;border:1px solid #ffffff30;border-radius:999px;background:#19152cdd;box-shadow:0 15px 50px #0008;backdrop-filter:blur(18px);font-weight:850;transition:.45s var(--ease)}.toast.show{transform:translate(-50%,0)}
    .particle{position:fixed;z-index:40;pointer-events:none}.confetti{width:9px;height:16px;animation:confetti 2.8s ease-out forwards}.emoji{top:-50px;font-size:30px;animation:rain 3.8s linear forwards}
    body.god .tile,body.lsd .tile{--bg:linear-gradient(135deg,hsl(var(--h),90%,58%),hsl(calc(var(--h) + 90),90%,62%));animation:rainbow .8s linear infinite,glow .7s infinite alternate}body.lsd{animation:hue 4s linear infinite}body.god h1:after{content:" GOD MODE";font-size:15px;letter-spacing:.1em;color:#fde047;-webkit-text-fill-color:#fde047}
    @keyframes spawn{from{transform:scale(0);opacity:0}}@keyframes merge{0%{transform:scale(1)}55%{transform:scale(1.25)}100%{transform:scale(1)}}@keyframes scoreBump{50%{transform:scale(1.12);color:#fde047}}@keyframes glow{to{filter:brightness(1.25);box-shadow:0 0 35px var(--shadow)}}@keyframes pulse{50%{opacity:.45;transform:scale(.98)}}@keyframes confetti{to{transform:translate(var(--dx),110vh) rotate(var(--rot));opacity:0}}@keyframes rain{to{transform:translateY(115vh) rotate(720deg)}}@keyframes rainbow{to{filter:hue-rotate(360deg)}}@keyframes hue{to{filter:hue-rotate(360deg)}}
    @media(max-width:480px){body{padding-top:16px;align-content:start}.top{align-items:center}.scores{gap:5px}.scorebox{min-width:68px;padding:7px}.scorebox b{font-size:17px}.tag{display:none}.bar{margin-bottom:7px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <main class="app">
    <div class="top"><div><h1>2048</h1><div class="tag">Neon edition · merge responsibly</div></div><div class="scores"><div class="scorebox" id="scoreBox"><span>SCORE</span><b id="score">0</b></div><div class="scorebox" id="bestBox"><span>BEST</span><b id="best">0</b></div></div></div>
    <div class="bar"><div class="status">Join the numbers.<span class="combo" id="combo"></span></div><div class="actions"><button id="undo" disabled>↶ Undo</button><button id="newGame">New game</button></div></div>
    <section class="board" id="board" aria-label="2048 game board"><div class="grid" id="grid"></div><div class="tiles" id="tiles"></div><div class="fly" id="fly"></div></section>
    <div class="near" id="near">The board is getting tight… just one more move.</div>
  </main>
  <div class="modal" id="modal"><div class="card"><h2 id="modalTitle">Game over</h2><p id="modalText">The grid fought bravely.</p><button id="modalButton">One more game</button></div></div>
  <div class="toast" id="toast"></div>
  <script>
  (()=>{'use strict';
    const $=s=>document.querySelector(s), tiles=$('#tiles'),fly=$('#fly'),scoreEl=$('#score'),bestEl=$('#best'),comboEl=$('#combo'),near=$('#near'),undoBtn=$('#undo'),modal=$('#modal');
    const KEY='neon2048-save-v1', BEST='neon2048-best-v1'; let board,score=0,best=+(localStorage.getItem(BEST)||0),undo=null,usedUndo=false,busy=false,won2048=false,won4096=false,lsd=false,audio;
    $('#grid').innerHTML='<div class="cell"></div>'.repeat(16); bestEl.textContent=best;
    const clone=b=>b.map(r=>[...r]), empty=()=>Array.from({length:4},()=>Array(4).fill(0));
    function tileHTML(v,r,c,extra=''){let size=v>=1024?' tiny':v>=128?' small':'';return `<div class="tile v${Math.min(v,4096)}${size} ${extra}" style="--r:${r};--c:${c};--h:${(v*37)%360}">${v}</div>`}
    function render(extra=[]){tiles.innerHTML=board.map((row,r)=>row.map((v,c)=>v?tileHTML(v,r,c,extra.some(x=>x.r===r&&x.c===c)?extra.find(x=>x.r===r&&x.c===c).type:''):'').join('')).join('');scoreEl.textContent=score.toLocaleString();bestEl.textContent=best.toLocaleString();undoBtn.disabled=!undo||usedUndo||busy;save();}
    function save(){localStorage.setItem(KEY,JSON.stringify({board,score,usedUndo,won2048,won4096,lsd}));}
    function addRandom(){let spots=[];board.forEach((row,r)=>row.forEach((v,c)=>{if(!v)spots.push([r,c])}));if(!spots.length)return null;let [r,c]=spots[Math.random()*spots.length|0];board[r][c]=Math.random()<.9?2:4;return {r,c,type:'spawn'};}
    function start(){board=empty();score=0;undo=null;usedUndo=false;won2048=false;won4096=false;modal.classList.remove('show');let a=addRandom(),b=addRandom();render([a,b]);}
    function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>t.classList.remove('show'),2300)}
    function sound(merges){if(!merges)return;try{audio||=(new (window.AudioContext||window.webkitAudioContext));if(audio.state==='suspended')audio.resume();for(let i=0;i<Math.min(merges,5);i++){let o=audio.createOscillator(),g=audio.createGain(),now=audio.currentTime+i*.055;o.type='sine';o.frequency.setValueAtTime(220*Math.pow(1.22,i),now);o.frequency.exponentialRampToValueAtTime(430*Math.pow(1.22,i),now+.11);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.14);o.connect(g).connect(audio.destination);o.start(now);o.stop(now+.15)}}catch(e){}}
    function calculate(dir){let next=empty(),motions=[],merges=[],gain=0;const lines=[];for(let i=0;i<4;i++){let cells=[];for(let j=0;j<4;j++){let r=dir==='up'?j:dir==='down'?3-j:i,c=dir==='left'?j:dir==='right'?3-j:i;cells.push({r,c,v:board[r][c]})}lines.push(cells)}
      lines.forEach(cells=>{let vals=cells.filter(x=>x.v),out=[];for(let i=0;i<vals.length;i++){if(i+1<vals.length&&vals[i].v===vals[i+1].v){out.push({v:vals[i].v*2,src:[vals[i],vals[i+1]],merged:true});gain+=vals[i].v*2;i++}else out.push({v:vals[i].v,src:[vals[i]],merged:false})}out.forEach((x,k)=>{let d=cells[k];next[d.r][d.c]=x.v;x.src.forEach(s=>motions.push({from:s,to:d,v:s.v}));if(x.merged)merges.push({r:d.r,c:d.c,type:'merge',v:x.v})})});
      return {next,motions,merges,gain,moved:JSON.stringify(next)!==JSON.stringify(board)};
    }
    function animateMove(result,done){fly.innerHTML='';result.motions.forEach(m=>{let d=document.createElement('div');d.innerHTML=tileHTML(m.v,m.from.r,m.from.c);let el=d.firstChild;fly.appendChild(el);el.animate([{transform:'translate(0,0)'},{transform:`translate(calc(${m.to.c-m.from.c} * (var(--cell) + var(--gap))),calc(${m.to.r-m.from.r} * (var(--cell) + var(--gap))))`}],{duration:145,easing:'cubic-bezier(.2,.8,.3,1)',fill:'forwards'})});tiles.style.opacity='0';setTimeout(()=>{fly.innerHTML='';tiles.style.opacity='1';done()},150)}
    function move(dir){if(busy||modal.classList.contains('show'))return;let res=calculate(dir);if(!res.moved)return;busy=true;undo={board:clone(board),score};let previousBest=best;animateMove(res,()=>{board=res.next;score+=res.gain;let spawn=addRandom();if(score>best){best=score;localStorage.setItem(BEST,best);if(previousBest>0){$('#bestBox').classList.remove('bump');void $('#bestBox').offsetWidth;$('#bestBox').classList.add('bump');toast('✨ New personal best!')}}
        let count=res.merges.length;if(count){comboEl.textContent=`${count}× COMBO`;comboEl.classList.add('on');setTimeout(()=>comboEl.classList.remove('on'),900);sound(count)}
        render([...res.merges,spawn].filter(Boolean));busy=false;undoBtn.disabled=usedUndo;checkSpecial();checkState();});}
    function checkSpecial(){let max=Math.max(...board.flat());if(max>=2048&&!won2048){won2048=true;confetti();toast('🔓 2048! The grid bends to your will.');save()}if(max>=4096&&!won4096){won4096=true;emojiRain();showModal('YOU MADMAN','4096. You absolute, magnificent menace.','Keep going');save()}}
    function canMove(){if(board.flat().includes(0))return true;for(let r=0;r<4;r++)for(let c=0;c<4;c++)if((r<3&&board[r][c]===board[r+1][c])||(c<3&&board[r][c]===board[r][c+1]))return true;return false}
    function checkState(){let empties=board.flat().filter(v=>!v).length;near.classList.toggle('show',empties<=2&&canMove());if(!canMove())setTimeout(()=>showModal('Game over',`Final score: ${score.toLocaleString()}. The next run is the one.`,'One more game'),250)}
    function showModal(title,text,button){$('#modalTitle').textContent=title;$('#modalText').textContent=text;$('#modalButton').textContent=button;modal.classList.add('show')}
    function burst(kind,items){for(let i=0;i<items;i++){let p=document.createElement('i');p.className=`particle ${kind}`;if(kind==='confetti'){p.style.left=Math.random()*100+'vw';p.style.top='-20px';p.style.background=`hsl(${Math.random()*360} 95% 60%)`;p.style.setProperty('--dx',(Math.random()*400-200)+'px');p.style.setProperty('--rot',(Math.random()*1200-600)+'deg');p.style.animationDelay=Math.random()*.5+'s'}else{p.textContent=['🤯','🔥','👑','💀','✨','🚀'][Math.random()*6|0];p.style.left=Math.random()*100+'vw';p.style.animationDelay=Math.random()*1.5+'s'}document.body.appendChild(p);setTimeout(()=>p.remove(),5500)}}
    const confetti=()=>burst('confetti',120),emojiRain=()=>burst('emoji',55);
    $('#newGame').onclick=()=>{if(score>0&&!modal.classList.contains('show')&&!confirm('Start a new game? Your current board will be replaced.'))return;start()};$('#modalButton').onclick=()=>{if(won4096&&canMove())modal.classList.remove('show');else start()};
    undoBtn.onclick=()=>{if(!undo||usedUndo||busy)return;board=clone(undo.board);score=undo.score;usedUndo=true;undo=null;modal.classList.remove('show');render();toast('↶ Time rewound. Choose wisely.')};
    const dirs={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};let konami=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'],ki=0,typed='';
    addEventListener('keydown',e=>{let k=e.key.length===1?e.key.toLowerCase():e.key;if(dirs[e.key]){e.preventDefault();move(dirs[e.key])}ki=k===konami[ki]?ki+1:(k===konami[0]?1:0);if(ki===konami.length){ki=0;board=board.map(row=>row.map(()=>512));document.body.classList.add('god');toast('⚡ GOD MODE UNLOCKED ⚡');confetti();render();checkState()}if(e.key.length===1){typed=(typed+k).slice(-3);if(typed==='lsd'){lsd=!lsd;document.body.classList.toggle('lsd',lsd);toast(lsd?'🌈 Psychedelic mode: ON':'Psychedelic mode: OFF');save()}}});
    let sx,sy;$('#board').addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY});$('#board').addEventListener('pointerup',e=>{if(sx==null)return;let dx=e.clientX-sx,dy=e.clientY-sy;sx=sy=null;if(Math.max(Math.abs(dx),Math.abs(dy))<28)return;move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'))});
    try{let s=JSON.parse(localStorage.getItem(KEY));if(s&&Array.isArray(s.board)&&s.board.length===4){({board,score=0,usedUndo=false,won2048=false,won4096=false,lsd=false}=s);document.body.classList.toggle('lsd',lsd);render();checkState()}else start()}catch(e){start()}
  })();
  </script>
</body>
</html>
